<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Silicon-Agnostic Engine v3.0</title>
    <style>
        :root { --accent: #00d4ff; --bg: #0a0b1e; --card-bg: rgba(255, 255, 255, 0.03); }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px; 
            min-height: 100vh;
        }

        .container { 
            width: 100%; 
            max-width: 700px; 
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 30px; 
            border-radius: 25px; 
            backdrop-filter: blur(20px); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        
        .stats-stack { display: flex; flex-direction: column; gap: 15px; }
        
        .card { 
            background: rgba(0,0,0,0.3); 
            padding: 18px; 
            border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        
        .card h4 { color: #888; margin: 0; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .card .value { font-size: 24px; font-weight: bold; margin-top: 5px; color: var(--accent); }

        .bar-container { height: 6px; background: #111; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--accent); transition: width 0.5s ease; width: 0%; }

        .terminal {
            background: #000;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            padding: 15px;
            border-radius: 12px;
            height: 150px;
            overflow-y: auto;
            font-size: 12px;
            border: 1px solid #222;
            line-height: 1.5;
        }

        .action-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 10px;
            width: 100%;
            transition: 0.3s;
        }

        .action-btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; background: #00ff88; margin-right: 8px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div>
                <h2 style="margin:0">Silicon-Agnostic Suite</h2>
                <span style="color:var(--accent); font-size:11px; font-weight:bold" id="os-tag">Detecting OS...</span>
            </div>
            <div id="status-tag" style="font-size: 10px;"><span class="status-dot"></span> LIVE INFRASTRUCTURE</div>
        </header>

        <div class="stats-stack">
            <div class="card">
                <h4>CPU Velocity</h4>
                <div class="value" id="cpu-val">0%</div>
                <div class="bar-container"><div class="bar-fill" id="cpu-bar"></div></div>
            </div>

            <div class="card" id="battery-card">
                <h4>Infrastructure Power</h4>
                <div class="value" id="bat-val">0%</div>
                <div id="power-tag" style="font-size: 11px; font-weight: bold; margin-top: 5px; color: var(--accent);">
                    Checking Source...
                </div>
                <div class="bar-container"><div class="bar-fill" id="bat-bar"></div></div>
            </div>

            <div class="card" style="border-left: 4px solid #f1c40f;">
                <h4>Energy Economics</h4>
                <div class="value" id="watt-val">0W</div>
                <div style="font-size: 11px; color: #666;">Est. Cost: <span id="cost-val" style="color:#f1c40f">₹0</span>/hr</div>
            </div>

            <div class="card" style="border-left: 4px solid #a29bfe;">
                <h4>Network Infrastructure</h4>
                <div class="value" id="ping-val">SCANNING...</div>
                <div style="font-size: 11px; color: #666;">Status: <span id="ping-status">Check Link</span></div>
            </div>
        </div>

        <div class="card" id="panel" style="border-left: 6px solid var(--accent); background: rgba(0,212,255,0.05);">
            <h4 id="mode-title">Initializing Logic...</h4>
            <p id="mode-desc" style="font-size: 13px; color:#ccc; margin: 10px 0;"></p>
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px;">
           <button class="action-btn" onclick="runStress()">⚡ Execute Load Stress Test</button>
           <div style="display: flex; gap: 10px;">
                <button class="action-btn" onclick="runPing()">🌐 Ping Infrastructure</button>
                <button class="action-btn" style="border-color:#ff4757; color:#ff4757" onclick="reapHeavy()">💀 Process Reaper</button>
           </div>
           <button class="action-btn" onclick="purgeMemory()">✨ Purge Volatile Memory</button>
        </div>

        <div style="margin-top: 10px;">
            <h4 style="font-size: 10px; color:#555; margin-bottom: 5px;">SYSTEM EVENT LOG</h4>
            <div class="terminal" id="terminal-log">
                <div>[SYSTEM] Silicon Engine v3.0 Online...</div>
            </div>
        </div>
    </div>

    <div id="toast" style="display:none; position:fixed; bottom:20px; right:20px; background:var(--accent); color:#000; padding:12px 20px; border-radius:8px; font-weight:bold; font-size:13px; z-index:100;"></div>

    <script>
        const terminal = document.getElementById('terminal-log');

        function addLog(msg) {
            const time = new Date().toLocaleTimeString();
            const line = document.createElement('div');
            line.innerHTML = `<span style="color:#555">[${time}]</span> ${msg}`;
            terminal.prepend(line);
        }

        async function updateStats() {
            try {
                const res = await fetch('/telemetry');
                const data = await res.json();
                
                // Update Basic Stats
                document.getElementById('cpu-val').innerText = data.cpu_load + "%";
                document.getElementById('cpu-bar').style.width = data.cpu_load + "%";
                document.getElementById('os-tag').innerText = data.os_info;
                
                // Update Battery/Power
                document.getElementById('bat-val').innerText = data.battery + "%";
                document.getElementById('bat-bar').style.width = data.battery + "%";
                document.getElementById('power-tag').innerText = data.power;

                // Update Energy
                document.getElementById('watt-val').innerText = data.watts + "W";
                document.getElementById('cost-val').innerText = "₹" + data.cost;

                // Update Decision UI
                document.getElementById('mode-title').innerText = data.decision;
                document.getElementById('panel').style.borderColor = data.color;

            } catch (e) { console.log("Reconnecting to Silicon..."); }
        }

        async function runStress() {
            addLog("STRESS TEST INITIATED...");
            const res = await fetch('/stress_test');
            const data = await res.json();
            addLog(`STRESS COMPLETE: Duration ${data.duration}s | Score: ${data.load_score}`);
        }

        async function purgeMemory() {
            const res = await fetch('/purge_memory');
            const data = await res.json();
            showToast(`Recovered ${data.saved_mb} MB`);
            addLog(`MEMORY PURGE: ${data.saved_mb} MB released.`);
        }

        async function runPing() {
            addLog("PINGING EXTERNAL INFRASTRUCTURE...");
            const res = await fetch('/ping_test');
            const data = await res.json();
            document.getElementById('ping-val').innerText = data.latency;
            document.getElementById('ping-status').innerText = data.details;
            addLog(`NETWORK: ${data.latency} - ${data.details}`);
        }

        async function reapHeavy() {
            addLog("REAPER SCANNING...");
            const res = await fetch('/system_action/reap_heavy');
            const data = await res.json();
            addLog(`REAPER: ${data.msg}`);
            showToast(data.msg);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        setInterval(updateStats, 2000);
        updateStats();
    </script>
</body>
</html>
